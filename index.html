    <script>

        const SUPABASE_URL = 'https://gcgwpxucjyybgbihqcgp.supabase.co'; // เปลี่ยนเป็น Supabase URL ของคุณ
        const SUPABASE_ANON_KEY = 'sb_publishable_Md6MPmrDEoi7ad3nvBwVMw_lTvJafJV'; // เปลี่ยนเป็น Anon Key ของคุณ
        
        // ห้ามใช้ชื่อตัวแปรซ้ำตามข้อกำหนด -> ใช้ dbClient แทน

        // ==========================================
        // 2. HELPER UTILITIES & UI CONTROLS
        // ==========================================
        function showLoader(show) {
            document.getElementById('globalLoader').classList.toggle('hidden', !show);
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `flex items-center gap-3 px-4 py-3 bg-white border-l-4 rounded-xl shadow-lg pointer-events-auto transform translate-y-2 opacity-0 transition duration-300 min-w-[280px] max-w-sm ${
                type === 'success' ? 'border-emerald-500 text-emerald-800' : type === 'warning' ? 'border-amber-500 text-amber-800' : 'border-red-500 text-red-800'
            }`;
            
            let icon = 'check-circle';
            if(type === 'warning') icon = 'alert-triangle';
            if(type === 'danger') icon = 'x-circle';

            toast.innerHTML = `<i data-lucide="${icon}" class="w-5 h-5 flex-shrink-0"></i><span class="text-sm font-medium">${message}</span>`;
            container.appendChild(toast);
            lucide.createIcons();

            setTimeout(() => { toast.classList.remove('translate-y-2', 'opacity-0'); }, 10);
            setTimeout(() => {
                toast.classList.add('translate-y-2', 'opacity-0');
                setTimeout(() => { toast.remove(); }, 300);
            }, 3500);
        }

        function toggleAdminPanel(isOpen) {
            const panel = document.getElementById('adminMobilePanel');
            panel.classList.toggle('translate-y-full', !isOpen);
        }

        function openLogoutModal() { 
            const modal = document.getElementById('logoutModal');
            modal.classList.remove('hidden');

            modal.classList.add('hidden');

        // Image compression helper (Canvas-based to preserve Storage)
        function processAndPreviewImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function (e) {
                const img = new Image();
                img.src = e.target.result;
                img.onload = function () {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 250;
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;

                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                    // Compress into base64 string
                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    
                    // Show preview
                    const preview = document.getElementById('formAvatarPreview');
                    const fallback = document.getElementById('formAvatarFallback');
                    preview.src = compressedBase64;
                    preview.classList.remove('hidden');
                    fallback.classList.add('hidden');
                    
                    // Store the data string temporarily
                    document.getElementById('formAvatarUrl').value = compressedBase64;
                }
            }
        }

        async function uploadCompressedImageToStorage(base64Str) {
            if(!base64Str || !base64Str.startsWith('data:image')) return base64Str;
            try {
                // Convert base64 back to raw file blob for upload
                const res = await fetch(base64Str);
                const blob = await res.blob();
                const fileName = `avatar_${Date.now()}_${Math.floor(Math.random()*1000)}.jpg`;

                const { data, error } = await dbClient.storage.from('img').upload(fileName, blob, {
                    contentType: 'image/jpeg',
                    upsert: true
                });

                if(error) throw error;
                // Form public url
                return `${SUPABASE_URL}/storage/v1/object/public/img/${fileName}`;
            } catch(err) {
                console.error(err);
                showToast('อัปโหลดรูปล้มเหลว ใช้ภาพสแตนดาร์ดแทน', 'warning');
                return null;
            }
        }

        // ==========================================
        // 3. ROUTING & INTERFACE DESIGN BUILDER
        // ==========================================
        function routeTo(viewName) {
            activeView = viewName;
            toggleAdminPanel(false);
            
            // Adjust App shell based on Role/State
            const sidebar = document.getElementById('sidebar');
            const bottomNav = document.getElementById('bottomNav');
            const mainContent = document.getElementById('mainContent');

            if (!currentUser) {
                sidebar.classList.add('hidden');
                bottomNav.classList.add('hidden');
                mainContent.classList.remove('md:pl-64');
            } else {
                sidebar.classList.remove('hidden');
                sidebar.classList.add('md:flex');
                bottomNav.classList.remove('hidden');
                mainContent.classList.add('md:pl-64');
                buildNavigationMenus();
            }

            renderView();
        }

                mNav.innerHTML = `
                    <button onclick="routeTo('dashboard')" class="flex flex-col items-center justify-center text-xs font-medium ${activeView==='dashboard'?'text-indigo-600':'text-slate-400'}"><i data-lucide="layout-dashboard" class="w-5 h-5"></i><span>แดชบอร์ด</span></button>
                    <button onclick="toggleAdminPanel(true)" class="flex flex-col items-center justify-center -translate-y-4 w-14 h-14 bg-indigo-600 text-white rounded-full shadow-lg border-4 border-white"><i data-lucide="menu" class="w-6 h-6"></i></button>
                    <button onclick="openLogoutModal()" class="flex flex-col items-center justify-center text-xs font-medium text-red-500"><i data-lucide="log-out" class="w-5 h-5"></i><span>ออก</span></button>

        // Processing Inserts/Updates Pipeline Execution
        async function handleFormSubmit(event) {
            event.preventDefault();
            const type = document.getElementById('formType').value;
            const id = document.getElementById('formId').value;
            let userId = document.getElementById('formUserId').value;
            let imgUrl = document.getElementById('formAvatarUrl').value;

            showLoader(true);

            // 1. Process image compression pipeline upload if newly given base64
            if(imgUrl.startsWith('data:image')) {
                imgUrl = await uploadCompressedImageToStorage(imgUrl);
            }

            try {
                // 2. Account Generation Module for New Entries by Admin
                if(!id && currentUser.role === 'Admin') {
                    const u = document.getElementById('accUsername').value.trim();
                    const p = document.getElementById('accPassword').value.trim();
                    const targetRole = type === 'student' ? 'Student' : 'Teacher';

                    const { data: newUser, error: uErr } = await dbClient.from('users').insert({
                        username: u, password: p, role: targetRole
                    }).select().single();

                    if(uErr) throw new Error('ไม่สามารถสร้างบัญชีผู้ใช้งานระบบได้ (ชื่อซ้ำกันหรือไม่)');
                    userId = newUser.id;
                }

                // 3. Payload preparation per specific parameters
                if(type === 'student') {
                    const payload = {
                        name: document.getElementById('std_name').value.trim(),
                        phone: document.getElementById('std_phone').value.trim(),
                        parent_name: document.getElementById('std_pname').value.trim(),
                        parent_phone: document.getElementById('std_pphone').value.trim(),
                        avatar_url: imgUrl
                    };

                    // Only admin can configure core structural details
                    if(currentUser.role === 'Admin') {
                        payload.student_code = document.getElementById('std_code').value.trim();
                        payload.grade_level = document.getElementById('std_grade').value;
                        payload.classroom = document.getElementById('std_class').value.trim();
                        payload.program = document.getElementById('std_program').value.trim();
                        if(!id) payload.user_id = userId;
                    }

                    let error;
                    if(id) {
                        ({ error } = await dbClient.from('students').update(payload).eq('id', id));
                    } else {
                        ({ error } = await dbClient.from('students').insert(payload));
                    }
                    if(error) throw error;

                } else if(type === 'staff') {
                    const payload = {
                        name: document.getElementById('stf_name').value.trim(),
                        phone: document.getElementById('stf_phone').value.trim(),
                        avatar_url: imgUrl
                    };

                    if(currentUser.role === 'Admin') {
                        payload.position = document.getElementById('stf_pos').value.trim();
                        payload.department = document.getElementById('stf_dept').value;
                        if(!id) payload.user_id = userId;
                    }

                    let error;
                    if(id) {
                        ({ error } = await dbClient.from('staff').update(payload).eq('id', id));
                    } else {
                        ({ error } = await dbClient.from('staff').insert(payload));
                    }
                    if(error) throw error;
                }

                showToast('บันทึกข้อมูลสารสนเทศสำเร็จเสร็จสิ้น');
                closeFormModal();
                
                // Re-render context states
                if(currentUser.role === 'Admin' || currentUser.role === 'Teacher') {
                    await renderView();
                } else {
                    routeTo('student_card');
                }

            } catch (err) {
                console.error(err);
                showToast(err.message || 'เกิดความล้มเหลวในการทำรายการฐานข้อมูล', 'danger');
            } finally {
                showLoader(false);
            }
        }

        // Delete Command execution
        async function deleteRowRecord(table, id) {
            if(!confirm('คุณแน่ใจหรือไม่ว่าต้องการลบข้อมูลสถิติตารางประวัตินี้อย่างถาวร?')) return;
            
            showLoader(true);
            const { error } = await dbClient.from(table).delete().eq('id', id);
            showLoader(false);

            if(error) {
                showToast('ล้มเหลวในการลบประวัติ', 'danger');
            } else {
                showToast('ลบข้อมูลเรียบร้อยแล้ว');
                renderView();
            }
        }

                'ระดับชั้นปี': s.grade_level,
                'ห้องเรียน': s.classroom,
                'แผนการเรียนกลุ่มสาระ': s.program,
                'เบอร์โทรศัพท์': s.phone || '-',
                'ชื่อผู้ปกครอง': s.parent_name || '-',
                'เบอร์โทรศัพท์ผู้ปกครอง': s.parent_phone || '-'
            }));

            const worksheet = XLSX.utils.json_to_sheet(reportData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Student_Records");
            
            // Output generation
            XLSX.writeFile(workbook, `รายงานสารสนเทศนักเรียน_${Date.now()}.xlsx`);
            showToast('ดาวน์โหลดเอกสารสรุป Excel สำเร็จ');
        }
    </script>
</body>
</html>
